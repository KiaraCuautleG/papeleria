<div class="min-h-screen bg-gray-100 flex items-center justify-center px-4">

  <div class="bg-white rounded-2xl shadow-lg p-10 w-full max-w-md">

    <!-- Logo / Título -->
    <div class="text-center mb-8">
      <div class="text-5xl mb-3">📚</div>
      <h1 class="text-2xl font-bold text-gray-800">Papelería Online</h1>
      <p class="text-gray-400 text-sm mt-1">Inicia sesión para continuar</p>
    </div>

    <!-- Correo -->
    <div class="mb-5">
      <label class="block text-sm font-medium text-gray-700 mb-1">Correo electrónico</label>
      <input
        type="email"
        [(ngModel)]="email"
        placeholder="usuario@correo.com"
        class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 transition"
      />
    </div>

    <!-- Contraseña -->
    <div class="mb-8">
      <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
      <div class="relative">
        <input
          [type]="showPassword ? 'text' : 'password'"
          [(ngModel)]="password"
          placeholder="••••••••"
          class="w-full border border-gray-300 rounded-lg px-4 py-2.5 pr-11 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 transition"
        />
        <button
          type="button"
          (click)="showPassword = !showPassword"
          class="absolute inset-y-0 right-3 flex items-center text-gray-400 hover:text-gray-600 transition"
          [title]="showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
        >
          {{ showPassword ? '🙈' : '👁️' }}
        </button>
      </div>
    </div>

    <!-- Botón -->
    <button
      (click)="iniciarSesion()"
      [disabled]="!email.trim() || !password.trim()"
      class="w-full py-2.5 rounded-lg text-sm font-semibold transition-colors"
      [class.bg-blue-600]="email.trim() && password.trim()"
      [class.hover:bg-blue-700]="email.trim() && password.trim()"
      [class.text-white]="email.trim() && password.trim()"
      [class.bg-gray-200]="!email.trim() || !password.trim()"
      [class.text-gray-400]="!email.trim() || !password.trim()"
      [class.cursor-not-allowed]="!email.trim() || !password.trim()"
    >
      Ingresar
    </button>

  </div>

</div>
