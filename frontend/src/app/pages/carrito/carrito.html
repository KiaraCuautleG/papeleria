<div class="max-w-5xl mx-auto p-6">
    <h1 class="text-3xl font-bold mb-6">
        🛒 Carrito de Compras
    </h1>

    <div *ngFor="let item of productos" class="border rounded-lg p-4 mb-4">
        <div class="flex justify-between items-center">

            <div>
                <h3 class="font-bold text-lg">
                    {{ item.producto.nombre }}
                </h3>

                <p class="text-gray-600">
                    {{ item.producto.categoria_nombre }}
                </p>

                <p class="font-semibold">
                    ${{ item.producto.precio }}
                </p>
            </div>

            <div class="flex items-center gap-3">

                <button (click)="disminuirCantidad(item.producto.id)" class="bg-gray-300 px-3 py-1 rounded">
                    -
                </button>

                <span class="font-bold">
                    {{ item.cantidad }}
                </span>

                <button (click)="aumentarCantidad(item.producto.id)" class="bg-gray-300 px-3 py-1 rounded">
                    +
                </button>

            </div>

            <div class="text-right">
                <p class="font-bold">
                    ${{ item.producto.precio * item.cantidad }}
                </p>

                <button (click)="eliminarProducto(item.producto.id)" class="text-red-600 text-sm">
                    Eliminar
                </button>
            </div>

        </div>
    </div>

    <div class="text-right mt-6">
        <h2 class="text-2xl font-bold">
            Total: ${{ total }}
        </h2>

        <button (click)="finalizarCompra()"
            class="mt-4 bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-lg">
            Finalizar compra
        </button>
    </div>
</div>
