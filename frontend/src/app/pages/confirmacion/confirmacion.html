<div class="min-h-screen bg-gray-100 flex items-center justify-center px-4 py-12">
  <div class="bg-white rounded-2xl shadow-lg p-10 w-full max-w-lg">

    <!-- Icono de éxito -->
    <div class="text-center mb-6">
      <div class="w-20 h-20 bg-fuchsia-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <svg lucideCircleCheck class="w-10 h-10 text-fuchsia-600"></svg>
      </div>
      <h1 class="text-2xl font-bold text-gray-800">¡Compra realizada!</h1>
      <p class="text-gray-400 text-sm mt-1">Gracias por tu pedido</p>
    </div>

    <!-- Info de la venta -->
    <div class="flex justify-between text-sm text-gray-500 mb-6 border-b pb-4">
      <div>
        <p class="text-xs uppercase font-semibold text-gray-400 mb-1">Número de venta</p>
        <p class="font-bold text-gray-800 text-lg">#{{ ventaId }}</p>
      </div>
      <div class="text-right">
        <p class="text-xs uppercase font-semibold text-gray-400 mb-1">Fecha</p>
        <p class="text-gray-700">{{ fecha }}</p>
      </div>
    </div>

    <!-- Detalle de productos -->
    <h3 class="text-xs font-semibold text-gray-400 uppercase mb-3">Productos</h3>
    <div class="divide-y divide-gray-100 mb-6">
      <div *ngFor="let item of items" class="flex justify-between items-center py-3 text-sm">
        <div>
          <p class="font-medium text-gray-700">{{ item.nombre }}</p>
          <p class="text-gray-400 text-xs">Cantidad: {{ item.cantidad }}</p>
        </div>
        <p class="font-semibold text-gray-800">${{ item.subtotal }}</p>
      </div>
    </div>

    <!-- Total -->
    <div class="flex justify-between items-center bg-fuchsia-50 rounded-xl px-4 py-3 mb-8">
      <span class="font-semibold text-gray-700">Total pagado</span>
      <span class="text-xl font-bold text-fuchsia-700">${{ total }}</span>
    </div>

    <!-- Acciones -->
    <div class="flex gap-3">
      <a
        routerLink="/"
        class="flex-1 text-center bg-purple-600 hover:bg-purple-700 text-white text-sm font-semibold py-2.5 rounded-lg transition-colors"
      >
        Seguir comprando
      </a>
    </div>

  </div>
</div>
