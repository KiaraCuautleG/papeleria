<div class="max-w-7xl mx-auto p-6">
  <h1 class="text-4xl font-bold text-center mb-8 flex items-center justify-center gap-3">
    <svg lucideBookOpen class="w-9 h-9"></svg> Papelaría Online
  </h1>

  <div class="flex justify-end mb-6">
        <a
            routerLink="/carrito"
            class="bg-fuchsia-600 hover:bg-fuchsia-700 text-white px-4 py-2 rounded-lg flex items-center gap-2"
        >
            <svg lucideShoppingCart class="w-4 h-4"></svg> Ver carrito
        </a>
    </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
    <div
      *ngFor="let producto of productos"
      class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition-shadow duration-300"
    >
      <img
        [src]="producto.imagen_url || 'https://placehold.co/400x250'"
        [alt]="producto.nombre"
        class="w-full h-52 object-cover"
      />

      <div class="p-4">
        <h2 class="text-xl font-bold mb-2">
          {{ producto.nombre }}
        </h2>

        <p class="text-gray-600 text-sm mb-3">
          {{ producto.descripcion }}
        </p>

        <p class="text-sm mb-1">
          <span class="font-semibold">Categoría:</span>
          {{ producto.categoria_nombre }}
        </p>

        <p class="text-sm mb-3">
          <span class="font-semibold">Stock:</span>
          {{ producto.stock }}
        </p>

        <div class="flex justify-between items-center">
          <span class="text-2xl font-bold text-fuchsia-700">
            ${{ producto.precio }}
          </span>

          <button
            (click)="agregarAlCarrito(producto)"
            class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-lg transition"
          >
            Agregar
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
