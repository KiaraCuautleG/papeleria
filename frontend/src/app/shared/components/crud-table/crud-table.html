<!-- Toolbar -->
<div class="mb-4 flex justify-between items-center gap-4">
  <div class="relative">
    <span class="absolute inset-y-0 left-3 flex items-center text-gray-400 text-sm">🔍</span>
    <input
      type="text"
      [(ngModel)]="searchTerm"
      placeholder="Buscar..."
      class="border border-gray-200 rounded-lg pl-9 pr-4 py-2 text-sm w-72 focus:outline-none focus:ring-2 focus:ring-blue-300"
    />
  </div>
  <button
    *ngIf="allowCreate"
    (click)="nuevaFila()"
    class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition-colors flex items-center gap-2"
  >
    ➕ Nuevo
  </button>
</div>

<!-- Tabla -->
<div class="overflow-x-auto rounded-xl border border-gray-100">
  <table class="w-full text-sm">
    <thead>
      <tr class="bg-gray-50 text-gray-400 uppercase text-xs">
        <th *ngFor="let column of columns" class="text-left px-4 py-3 font-semibold">
          {{ column.label }}
        </th>
        <th class="text-center px-4 py-3 font-semibold">Acciones</th>
      </tr>
    </thead>

    <tbody>

      <!-- Filas existentes -->
      <tr *ngFor="let item of filteredData" class="border-t border-gray-100 hover:bg-gray-50 transition-colors">

        <td *ngFor="let column of columns" class="px-4 py-3 text-gray-700">
          <span *ngIf="editingId !== item.id">
            {{ getDisplayValue(column, item) }}
          </span>
          <ng-container *ngIf="editingId === item.id">
            <input
              *ngIf="column.type !== 'select'"
              [(ngModel)]="item[column.field]"
              class="border border-gray-300 rounded-lg px-2 py-1 w-full text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"
            />
            <select
              *ngIf="column.type === 'select'"
              [(ngModel)]="item[column.field]"
              class="border border-gray-300 rounded-lg px-2 py-1 w-full text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"
            >
              <option *ngFor="let option of selectOptions[column.selectKey || '']" [value]="option.id">
                {{ option.nombre }}
              </option>
            </select>
          </ng-container>
        </td>

        <td class="px-4 py-3 text-center whitespace-nowrap">
          <ng-container *ngIf="editingId !== item.id">
            <button *ngIf="allowEdit" (click)="editar(item.id)"
              class="text-blue-500 hover:text-blue-700 hover:bg-blue-50 rounded-lg px-2 py-1 transition-colors mr-1"
              title="Editar">✏️</button>
            <button *ngIf="allowDelete" (click)="eliminar(item.id)"
              class="text-red-400 hover:text-red-600 hover:bg-red-50 rounded-lg px-2 py-1 transition-colors"
              title="Eliminar">🗑️</button>
          </ng-container>
          <ng-container *ngIf="editingId === item.id">
            <button (click)="guardar(item)"
              class="text-green-600 hover:text-green-800 hover:bg-green-50 rounded-lg px-2 py-1 transition-colors mr-1"
              title="Guardar">💾</button>
            <button (click)="cancelar()"
              class="text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-lg px-2 py-1 transition-colors"
              title="Cancelar">❌</button>
          </ng-container>
          <button *ngIf="!allowEdit && !allowDelete" (click)="verDetalle(item.id)"
            class="text-blue-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg px-2 py-1 transition-colors"
            title="Ver detalle">👁️</button>
        </td>

      </tr>

      <!-- Sin resultados -->
      <tr *ngIf="filteredData.length === 0">
        <td [attr.colspan]="columns.length + 1" class="px-4 py-8 text-center text-gray-400 text-sm">
          No se encontraron registros.
        </td>
      </tr>

      <!-- Nueva fila -->
      <tr *ngIf="creating" class="border-t border-blue-100 bg-blue-50">
        <td *ngFor="let column of columns" class="px-4 py-3">
          <input
            *ngIf="column.type !== 'select'"
            [(ngModel)]="newRow[column.field]"
            class="border border-gray-300 rounded-lg px-2 py-1 w-full text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"
          />
          <select
            *ngIf="column.type === 'select'"
            [(ngModel)]="newRow[column.field]"
            class="border border-gray-300 rounded-lg px-2 py-1 w-full text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"
          >
            <option *ngFor="let option of selectOptions[column.selectKey || '']" [value]="option.id">
              {{ option.nombre }}
            </option>
          </select>
        </td>
        <td class="px-4 py-3 text-center whitespace-nowrap">
          <button (click)="crear()"
            class="text-green-600 hover:text-green-800 hover:bg-green-50 rounded-lg px-2 py-1 transition-colors mr-1"
            title="Crear">💾</button>
          <button (click)="cancelar()"
            class="text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-lg px-2 py-1 transition-colors"
            title="Cancelar">❌</button>
        </td>
      </tr>

    </tbody>
  </table>
</div>
