<nav class="bg-purple-700 text-white shadow-lg">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

        <a routerLink="/" class="text-2xl font-bold hover:text-gray-200 flex items-center gap-2">
            <svg lucideBookOpen class="w-6 h-6"></svg> Papelería Online
        </a>

        <div class="flex gap-4 items-center">

            <a routerLink="/" class="hover:text-gray-200">
                Productos
            </a>

            <a *ngIf="isAdmin" routerLink="/admin" class="hover:text-gray-200 flex items-center gap-1">
                <svg lucideSettings class="w-4 h-4"></svg> Admin
            </a>

            <!-- Usuario logueado -->
            <span *ngIf="isLoggedIn" class="flex items-center gap-1">
                <svg lucideUser class="w-4 h-4"></svg> {{ usuario.nombre }}
            </span>

            <!-- Login -->
            <a *ngIf="!isLoggedIn" routerLink="/login" class="flex items-center gap-1">
                <svg lucideLogIn class="w-4 h-4"></svg> Iniciar sesión
            </a>

            <!-- Logout -->
            <button *ngIf="isLoggedIn" (click)="cerrarSesion()" class="flex items-center gap-1">
                <svg lucideLogOut class="w-4 h-4"></svg> Salir
            </button>

            <a routerLink="/carrito" class="bg-fuchsia-600 hover:bg-fuchsia-700 px-4 py-2 rounded-lg transition flex items-center gap-2">
                <svg lucideShoppingCart class="w-4 h-4"></svg> Carrito ({{ cantidadProductos }})
            </a>

        </div>

    </div>
</nav>
